{% extends 'base.html' %}

{% block content %}
<div class="container">
  <h2>Scan Vehicle Number Plate</h2>
  <div class="row mt-4">
    <div class="col-md-6">
      <div class="card p-4">
        <h5>Capture / Upload Image</h5>
        <video id="video" autoplay playsinline style="width:100%; border-radius:8px; margin-bottom:1rem;"></video>
        <div style="display:flex; gap:0.5rem;">
          <button id="snapBtn" class="btn btn-primary" style="flex:1;">Capture & Detect</button>
          <input type="file" id="imgInput" class="form-control" style="flex:1;">
        </div>
        <canvas id="canvas" style="display:none;"></canvas>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card p-4">
        <h5>Detection Result</h5>
        <img id="preview" style="width:100%; border-radius:8px; margin-bottom:1rem;" src="" alt="Preview">
        <p><strong>Detected Plate:</strong> <span id="plateText" style="color:#2563eb; font-weight:bold;">-</span></p>
        <p><strong>Wallet Status:</strong> <span id="walletInfo">-</span></p>
        <div id="billingBlock" style="display:none;">
          <hr>
          <h6>Billing Details</h6>
          <div class="mb-2">
            <label class="form-label">Fuel Type</label>
            <select id="fuelType" class="form-select">
              <option>Petrol</option>
              <option>Diesel</option>
              <option>CNG</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Liters</label>
            <input id="liters" class="form-control" type="number" value="1" step="0.1">
          </div>
          <div class="mb-2">
            <label class="form-label">Rate (₹/L)</label>
            <input id="rate" class="form-control" type="number" value="100">
          </div>
          <div style="display:flex; gap:0.5rem;">
            <button id="generateBill" class="btn btn-success" style="flex:1;">Generate Bill</button>
            <button id="purchaseBtn" class="btn btn-warning" style="flex:1;">Purchase</button>
          </div>
          <div id="billDetails" class="mt-3" style="display:none;">
            <p><strong>Amount: ₹<span id="billAmount">0</span></strong></p>
            <button id="downloadBill" class="btn btn-primary w-100">Download Invoice</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="logs" class="mt-4" style="background:#f0f0f0; padding:1rem; border-radius:8px; font-size:0.85rem; max-height:200px; overflow-y:auto;"></div>
</div>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
