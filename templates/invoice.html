<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Invoice - FuelIQ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; }
    .invoice-box { border:1px solid #eee; padding:20px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="invoice-box">
    <h2 style="text-align:center; color:#2563eb;">FuelIQ Invoice</h2>
    <hr>
    <p><strong>Date & Time:</strong> {{ date }}</p>
    <p><strong>Vehicle Plate:</strong> <span style="color:#dc2626; font-weight:bold;">{{ plate }}</span></p>
    <p><strong>Fuel Type:</strong> {{ fuel }}</p>
    <p><strong>Quantity:</strong> {{ liters }} Liters</p>
    <p><strong>Rate:</strong> ₹{{ rate }}/Liter</p>
    <hr>
    <h3 style="text-align:right; color:#16a34a;">Total: ₹{{ total }}</h3>
    <hr>
    <p style="text-align:center; font-size:0.9rem; color:#64748b;">Thank you for using FuelIQ Smart Fueling System.</p>
  </div>
</body>
</html>
