<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuelIQ — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --bg:      #0d0f18;
      --surface: #161927;
      --card:    #1c1f2e;
      --border:  #272b3f;
      --accent:  #6c63ff;
      --accent-h:#5a52e0;
      --glow:    rgba(108,99,255,.22);
      --tx:      #e2e8f0;
      --tm:      #64748b;
      --td:      #94a3b8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── animated background particles ── */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .bg-glow span {
      position: absolute; border-radius: 50%;
      background: var(--accent); opacity: .06; animation: float 12s infinite ease-in-out;
    }
    .bg-glow span:nth-child(1){ width:420px;height:420px;top:-120px;left:-100px;animation-delay:0s; }
    .bg-glow span:nth-child(2){ width:300px;height:300px;bottom:-80px;right:-60px;animation-delay:4s; }
    .bg-glow span:nth-child(3){ width:180px;height:180px;top:40%;left:60%;animation-delay:8s; }
    @keyframes float {
      0%,100%{ transform:translateY(0) scale(1); }
      50%    { transform:translateY(-30px) scale(1.05); }
    }

    /* ── layout ── */
    .page-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem; position: relative; z-index: 1;
    }

    /* ── brand ── */
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: #fff; margin: 0 auto 1rem;
      box-shadow: 0 8px 32px var(--glow);
    }
    .brand h1 { font-size: 2rem; font-weight: 800; color: var(--tx); letter-spacing: .5px; }
    .brand p  { color: var(--tm); font-size: .9rem; margin-top: .25rem; }

    /* ── card ── */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; max-width: 420px;
      padding: 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
    }

    /* ── tabs ── */
    .tab-row {
      display: flex; gap: .5rem;
      background: var(--surface);
      border-radius: 10px; padding: .3rem;
      margin-bottom: 1.75rem;
    }
    .tab-btn {
      flex: 1; padding: .55rem; border: none; border-radius: 8px;
      background: transparent; color: var(--tm);
      font-size: .87rem; font-weight: 600; cursor: pointer;
      transition: all .2s; display: flex; align-items: center; justify-content: center; gap: .4rem;
    }
    .tab-btn.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 14px var(--glow);
    }

    /* ── form elements ── */
    .f-label { font-size: .78rem; color: var(--td); margin-bottom: .35rem; display: block; }
    .f-input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; color: var(--tx); padding: .65rem .9rem;
      font-size: .9rem; transition: border-color .2s, box-shadow .2s; outline: none;
    }
    .f-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }
    .f-input::placeholder { color: var(--tm); }
    .f-group { margin-bottom: 1.1rem; position: relative; }
    .f-icon {
      position: absolute; right: .85rem; top: 50%; transform: translateY(-50%);
      color: var(--tm); font-size: 1rem; pointer-events: none;
    }

    /* ── submit button ── */
    .btn-login {
      width: 100%; padding: .75rem; border: none; border-radius: 10px;
      background: var(--accent); color: #fff;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      transition: background .2s, box-shadow .2s; margin-top: .5rem;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-login:hover { background: var(--accent-h); box-shadow: 0 6px 20px var(--glow); }

    /* ── alerts ── */
    .alert {
      border-radius: 9px; font-size: .85rem; padding: .65rem .9rem;
      margin-bottom: 1rem; border: 1px solid transparent;
    }
    .alert-danger  { background: rgba(239,68,68,.12);  color: #fca5a5; border-color: rgba(239,68,68,.25); }
    .alert-success { background: rgba(34,197,94,.12);  color: #86efac; border-color: rgba(34,197,94,.25); }
    .alert-info    { background: rgba(108,99,255,.12); color: #a5b4fc; border-color: rgba(108,99,255,.25); }
    .btn-close { filter: invert(.6); }

    /* ── footer ── */
    footer {
      text-align: center; padding: 1.25rem;
      color: var(--tm); font-size: .8rem;
      border-top: 1px solid var(--border);
      position: relative; z-index: 1;
    }
    footer strong { color: var(--accent); }
  </style>
</head>
<body>

  <div class="bg-glow">
    <span></span><span></span><span></span>
  </div>

  <div class="page-wrap">

    <div class="brand">
      <div class="brand-icon"><i class="bi bi-fuel-pump-fill"></i></div>
      <h1>FuelIQ</h1>
      <p>Smarter fueling with intelligent billing</p>
    </div>

    <div class="login-card">

      <!-- tabs -->
      <div class="tab-row">
        <button class="tab-btn active" data-tab="admin">
          <i class="bi bi-shield-lock-fill"></i> Admin
        </button>
        <button class="tab-btn" data-tab="user">
          <i class="bi bi-person-fill"></i> User
        </button>
      </div>

      <!-- flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Admin form -->
      <form id="adminForm" method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="login_type" value="admin">
        <div class="f-group">
          <label class="f-label">Username</label>
          <input class="f-input" type="text" name="username" placeholder="Enter username" required autofocus>
          <i class="bi bi-person f-icon"></i>
        </div>
        <div class="f-group">
          <label class="f-label">Password</label>
          <input class="f-input" type="password" name="password" placeholder="Enter password" required id="adminPwd">
          <i class="bi bi-lock f-icon" id="adminPwdIcon" style="cursor:pointer;pointer-events:all"
             onclick="togglePwd('adminPwd','adminPwdIcon')"></i>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>

      <!-- User form -->
      <form id="userForm" method="POST" action="{{ url_for('login') }}" style="display:none">
        <input type="hidden" name="login_type" value="user">
        <div class="f-group">
          <label class="f-label">Wallet ID</label>
          <input class="f-input" type="text" name="username" placeholder="e.g. WALLET123456" required>
          <i class="bi bi-wallet2 f-icon"></i>
        </div>
        <div class="f-group">
          <label class="f-label">Password <span style="color:var(--tm)">(optional)</span></label>
          <input class="f-input" type="password" name="password" placeholder="Leave blank if not set" id="userPwd">
          <i class="bi bi-lock f-icon" id="userPwdIcon" style="cursor:pointer;pointer-events:all"
             onclick="togglePwd('userPwd','userPwdIcon')"></i>
        </div>
        <button type="submit" class="btn-login" style="background:#22c55e">
          <i class="bi bi-person-check-fill"></i> Access Wallet
        </button>
      </form>

    </div>
  </div>

  <footer>
    <strong>FuelIQ</strong> &nbsp;·&nbsp; Smarter fueling with intelligent billing
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const t = this.dataset.tab;
        document.getElementById('adminForm').style.display = t === 'admin' ? 'block' : 'none';
        document.getElementById('userForm').style.display  = t === 'user'  ? 'block' : 'none';
      });
    });

    // password toggle
    function togglePwd(inputId, iconId) {
      const inp  = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash f-icon';
      } else {
        inp.type = 'password';
        icon.className = 'bi bi-lock f-icon';
      }
      icon.style.cssText = 'cursor:pointer;pointer-events:all';
    }
  </script>
</body>
</html>
